name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    name: Modül sözdizimi (node --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: ihya3d.html modül scriptini kontrol et
        run: node .github/scripts/check-module.mjs

  secret-scan:
    name: Gizli anahtar taraması (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tüm geçmişi tara
      - name: gitleaks kur
        run: |
          VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Sızan sır var mı?
        run: gitleaks detect --no-banner --redact --verbose
